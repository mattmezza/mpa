{# Accounts tab wrapper: Email | Calendars | Contacts sub-tabs. Each sub-tab
   lazy-loads its own partial via htmx. The active sub-tab is mirrored in the
   URL as ?accountsub= for copy-pasteable links. #}
<div x-data="accountsTabs()" x-init="init()">
  <div class="flex border-b border-border mb-4 overflow-x-auto">
    <button type="button" class="tab-link" :class="sub === 'email' && 'tab-link-active'" @click="select('email')">Email</button>
    <button type="button" class="tab-link" :class="sub === 'calendars' && 'tab-link-active'" @click="select('calendars')">Calendars</button>
    <button type="button" class="tab-link" :class="sub === 'contacts' && 'tab-link-active'" @click="select('contacts')">Contacts</button>
  </div>
  <div id="accounts-sub">
    <span class="text-muted text-xs">Loading...</span>
  </div>
</div>
