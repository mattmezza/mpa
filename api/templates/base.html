<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="py-8" style="padding-left: 32px; padding-right: 32px;">
  {% block body %}{% endblock %}

  <div id="toast" style="position: fixed; right: 24px; bottom: 24px; display: none; z-index: 100; max-width: 360px;"></div>

  <script>
    // Global: set HTMX auth header from localStorage
    document.body.addEventListener('htmx:configRequest', function(e) {
      const key = localStorage.getItem('admin_api_key') || '';
      if (key) {
        e.detail.headers['Authorization'] = 'Bearer ' + key;
      }
    });

    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (window.Alpine && e.detail && e.detail.target) {
        window.Alpine.initTree(e.detail.target);
      }
    });

    function showToast(message, ok = true) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = ok ? 'alert-success' : 'alert-error';
      toast.style.display = 'block';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => {
        toast.style.display = 'none';
      }, 2500);
    }
    window.showToast = showToast;

    // Restart-required affordance. Some settings (channels, voice, history length)
    // are read once when the agent starts, so a save only takes effect after a
    // restart. notifyRestartRequired() surfaces the banner; restartAgentNow()
    // restarts and refreshes the top-left status badge via the refresh-status event.
    function notifyRestartRequired() {
      const b = document.getElementById('restart-banner');
      if (b) b.style.display = 'block';
    }
    window.notifyRestartRequired = notifyRestartRequired;

    function dismissRestartBanner() {
      const b = document.getElementById('restart-banner');
      if (b) b.style.display = 'none';
    }
    window.dismissRestartBanner = dismissRestartBanner;

    function restartAgentNow(btn) {
      const key = localStorage.getItem('admin_api_key') || '';
      const original = btn ? btn.textContent : '';
      if (btn) { btn.disabled = true; btn.textContent = 'Restarting…'; }
      // Flip the badge to RESTARTING immediately, then settle on the final state.
      document.body.dispatchEvent(new CustomEvent('refresh-status'));
      fetch('/agent/restart', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + key }
      })
        .then(r => r.json().catch(() => ({})))
        .then(data => {
          const ok = data.status === 'restarted';
          if (window.showToast) showToast(ok ? 'Agent restarted' : (data.error || data.detail || 'Restart failed'), ok);
          if (ok) dismissRestartBanner();
        })
        .catch(() => { if (window.showToast) showToast('Restart failed', false); })
        .finally(() => {
          document.body.dispatchEvent(new CustomEvent('refresh-status'));
          if (btn) { btn.disabled = false; btn.textContent = original || 'Restart now'; }
        });
    }
    window.restartAgentNow = restartAgentNow;

    // Voice preview (#84): synthesize `text` in `voice` and play it. The engine
    // is chosen server-side from the voice name; `lang` (Kokoro only) overrides
    // the pronunciation language. `text`/`lang` blank → server defaults. `btn`
    // (optional) shows progress.
    function previewVoice(voice, text, lang, btn) {
      const key = localStorage.getItem('admin_api_key') || '';
      const original = btn ? btn.textContent : '';
      if (btn) { btn.disabled = true; btn.textContent = '…'; }
      fetch('/voice/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ voice: voice || '', text: text || '', lang: lang || '' })
      })
        .then(async r => {
          if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'Preview failed'); }
          return r.blob();
        })
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          const cleanup = () => URL.revokeObjectURL(url);
          audio.onended = cleanup;
          audio.onerror = cleanup;
          audio.play().catch(cleanup);  // autoplay rejection etc. — don't leak the URL
        })
        .catch(e => { if (window.showToast) showToast(e.message, false); })
        .finally(() => { if (btn) { btn.disabled = false; btn.textContent = original || '▶ Preview'; } });
    }
    window.previewVoice = previewVoice;

    function llmTab(provider, apiKey, model, openaiKey, openaiBaseUrl, googleKey, googleBaseUrl, grokKey, grokBaseUrl, deepseekKey, deepseekBaseUrl, extractionProvider, extractionModel, consolidationProvider, consolidationModel, gdEnabled, gdProvider, gdModel, trEnabled, trProvider, trModel, promptToolUsageOverride, promptHistoryOverride, defaultToolUsage, defaultHistoryHandling, promptCaptureEnabled, compactionProvider, compactionModel, thinkingLevel, extractionThinkingLevel, consolidationThinkingLevel, gdThinkingLevel, trThinkingLevel, compactionThinkingLevel, visionEnabled, visionProvider, visionModel, rdEnabled, rdProvider, rdModel, rdThinkingLevel, rdGroupOnly, rdMaxReplies, rdWindowSeconds, maxTokens, temperature, trMaxReflections) {
      const currentProvider = provider || 'anthropic';
      return {
        // Sub-tab within the LLM tab (issue #114): sysprompt | inference | providers.
        // Persisted so switching away and back, or a partial reload after a
        // provider save, lands on the same sub-tab.
        section: (() => {
          const allowed = ['sysprompt', 'inference', 'providers'];
          try {
            const q = new URLSearchParams(window.location.search).get('llmsub');
            if (allowed.includes(q)) return q;
            const ls = localStorage.getItem('llm_section');
            if (allowed.includes(ls)) return ls;
          } catch (e) {}
          return 'sysprompt';
        })(),
        setSection(s) {
          this.section = s;
          try { localStorage.setItem('llm_section', s); } catch (e) {}
          try {
            const url = new URL(window.location.href);
            url.searchParams.set('llmsub', s);
            history.replaceState(history.state, '', url);
          } catch (e) {}
        },
        reloadLlmPartial() { if (window.htmx) { htmx.ajax('GET', '/partials/llm', {target: '#tab-content', swap: 'innerHTML'}); } },
        providerOptions: [
          {value: 'anthropic', label: 'Anthropic'},
          {value: 'openai', label: 'OpenAI'},
          {value: 'google', label: 'Google Gemini'},
          {value: 'grok', label: 'Grok (xAI)'},
          {value: 'deepseek', label: 'DeepSeek'}
        ],
        provider: currentProvider,
        apiKey: apiKey || '',
        model: model || '',
        maxTokens: maxTokens || '8192',
        temperature: temperature || '0.5',
        thinkingLevel: thinkingLevel || '',
        extractionThinkingLevel: extractionThinkingLevel || '',
        consolidationThinkingLevel: consolidationThinkingLevel || '',
        gdThinkingLevel: gdThinkingLevel || '',
        trThinkingLevel: trThinkingLevel || '',
        compactionThinkingLevel: compactionThinkingLevel || '',
        fetchedLevels: {anthropic: [], openai: [], google: [], grok: [], deepseek: []},
        fetchingLevels: {anthropic: false, openai: false, google: false, grok: false, deepseek: false},
        fetchLevelsResult: {anthropic: '', openai: '', google: '', grok: '', deepseek: ''},
        openaiKey: openaiKey || '',
        openaiBaseUrl: openaiBaseUrl || '',
        googleKey: googleKey || '',
        googleBaseUrl: googleBaseUrl || '',
        grokKey: grokKey || '',
        grokBaseUrl: grokBaseUrl || '',
        deepseekKey: deepseekKey || '',
        deepseekBaseUrl: deepseekBaseUrl || '',
        extractionProvider: extractionProvider || 'anthropic',
        extractionModel: extractionModel || 'claude-haiku-4-5',
        consolidationProvider: consolidationProvider || 'anthropic',
        consolidationModel: consolidationModel || 'claude-haiku-4-5',
        gdEnabled: gdEnabled === 'true' || gdEnabled === true,
        gdProvider: gdProvider || 'anthropic',
        gdModel: gdModel || 'claude-haiku-4-5',
        trEnabled: trEnabled === 'true' || trEnabled === true,
        trProvider: trProvider || 'anthropic',
        trModel: trModel || 'claude-haiku-4-5',
        trMaxReflections: trMaxReflections || '12',
        promptToolUsageOverride: promptToolUsageOverride || '',
        promptHistoryOverride: promptHistoryOverride || '',
        defaultToolUsage: defaultToolUsage || '',
        defaultHistoryHandling: defaultHistoryHandling || '',
        promptCaptureEnabled: promptCaptureEnabled === true || promptCaptureEnabled === 'true',
        promptPreviewMessage: '',
        includePreviewMemories: true,
        includePreviewReflections: true,
        promptPreviewResult: '',
        promptPreviewOk: false,
        promptPreviewLoading: false,
        promptPreviewRaw: '',
        promptPreviewSections: null,
        promptPreviewMeta: null,
        recentPrompts: [],
        recentPromptsLoading: false,
        promptSaveResult: '',
        promptSaveOk: false,
        memoryResult: '',
        memoryResultOk: false,
        gdResult: '',
        gdResultOk: false,
        trResult: '',
        trResultOk: false,
        rdEnabled: rdEnabled === 'true' || rdEnabled === true,
        rdProvider: rdProvider || 'deepseek',
        rdModel: rdModel || 'deepseek-v4-flash',
        rdThinkingLevel: rdThinkingLevel || '',
        rdGroupOnly: rdGroupOnly === 'true' || rdGroupOnly === true,
        rdMaxReplies: rdMaxReplies || '6',
        rdWindowSeconds: rdWindowSeconds || '120',
        rdResult: '',
        rdResultOk: false,
        compactionProvider: compactionProvider || 'anthropic',
        compactionModel: compactionModel || 'claude-haiku-4-5',
        compactionResult: '',
        compactionResultOk: false,
        visionEnabled: visionEnabled === 'true' || visionEnabled === true,
        visionProvider: visionProvider || 'anthropic',
        visionModel: visionModel || 'claude-haiku-4-5',
        visionResult: '',
        visionResultOk: false,
        result: '',
        resultOk: false,
        tests: {
          anthropic: currentProvider === 'anthropic',
          openai: currentProvider === 'openai',
          google: currentProvider === 'google',
          grok: currentProvider === 'grok',
          deepseek: currentProvider === 'deepseek'
        },
        testing: {
          anthropic: false,
          openai: false,
          google: false,
          grok: false,
          deepseek: false
        },
        testResults: {
          anthropic: '',
          openai: '',
          google: '',
          grok: '',
          deepseek: ''
        },
        models: {
          anthropic: [
            {value: 'claude-4-6-opus', label: 'claude-4-6-opus'},
            {value: 'claude-4-6-sonnet', label: 'claude-4-6-sonnet'},
            {value: 'claude-haiku-4-5', label: 'claude-haiku-4-5'}
          ],
          openai: [
            {value: 'gpt-5.2-thinking', label: 'gpt-5.2-thinking'},
            {value: 'gpt-5.2-pro', label: 'gpt-5.2-pro'},
            {value: 'gpt-5.2-instant', label: 'gpt-5.2-instant'},
            {value: 'gpt-5-mini', label: 'gpt-5-mini'}
          ],
          google: [
            {value: 'gemini-deep-think-latest', label: 'gemini-deep-think-latest'},
            {value: 'gemini-pro-latest', label: 'gemini-pro-latest'},
            {value: 'gemini-flash-latest', label: 'gemini-flash-latest'}
          ],
          grok: [
            {value: 'grok-4.20-beta', label: 'grok-4.20-beta'},
            {value: 'grok-4-latest', label: 'grok-4-latest'},
            {value: 'grok-4.1-fast', label: 'grok-4.1-fast'}
          ],
          deepseek: [
            {value: 'deepseek-chat', label: 'deepseek-chat'},
            {value: 'deepseek-reasoner', label: 'deepseek-reasoner'}
          ]
        },
        fetchedModels: {anthropic: [], openai: [], google: [], grok: [], deepseek: []},
        fetchingModels: {anthropic: false, openai: false, google: false, grok: false, deepseek: false},
        fetchModelsResult: {anthropic: '', openai: '', google: '', grok: '', deepseek: ''},
        modelOptions(prov) {
          const fetched = this.fetchedModels[prov];
          if (fetched && fetched.length) {
            return fetched.map(id => ({value: id, label: id}));
          }
          return this.models[prov] || [];
        },
        // ponytail: substring heuristic for reasoning-capable models — extend the
        // list as model ids change; the thinking-level control shows only when true.
        modelSupportsThinking(modelId) {
          const id = (modelId || '').toLowerCase();
          if (!id) return false;
          return ['opus', 'sonnet', 'thinking', 'pro', 'deep-think', 'reasoner', 'grok-4']
            .some(pat => id.includes(pat));
        },
        // ponytail: mirror of model_supports_vision() in core/llm.py — keep in
        // sync. True when the model reads images natively (no fallback needed).
        modelSupportsVision(modelId, prov) {
          const id = (modelId || '').toLowerCase();
          if (!id) return false;
          if (id.includes('deepseek')) return false;
          if (prov === 'anthropic' || prov === 'google') return true;
          return ['claude', 'gpt-4o', 'gpt-4.1', 'gpt-5', 'o1', 'o3', 'o4',
                  'gemini', 'grok-4', 'grok-2-vision', 'vision', 'llava', 'pixtral']
            .some(pat => id.includes(pat));
        },
        // One-tap from the model picker: turn the fallback on (seeding a default
        // vision model if blank) and persist — no trip to the Vision card needed.
        enableVisionFallback() {
          this.visionEnabled = true;
          if (!this.visionModel) { this.visionModel = 'claude-haiku-4-5'; }
          this.saveVision();
        },
        saveVision() {
          fetch('/config', {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({values: {
              'vision.enabled': this.visionEnabled ? 'true' : 'false',
              'vision.provider': this.visionProvider,
              'vision.model': this.visionModel
            }})
          })
            .then(r => { this.visionResultOk = r.ok; return r.json(); })
            .then(d => {
              this.visionResult = this.visionResultOk ? 'Vision settings saved' : (d.detail || 'Error');
              if (this.visionResultOk && window.showToast) { window.showToast('Vision settings saved'); }
            })
            .catch(e => { this.visionResultOk = false; this.visionResult = e.message; });
        },
        // Effort values offered in the thinking-level datalist. Anthropic can be
        // enriched live via "Fetch levels"; others fall back to the common set.
        levelOptions(prov) {
          const fetched = this.fetchedLevels[prov];
          if (fetched && fetched.length) return fetched;
          return ['low', 'medium', 'high'];
        },
        fetchThinkingLevels(service, model) {
          const apiKey = this.keyFor(service);
          if (!apiKey) { this.fetchLevelsResult[service] = 'Missing API key — save/enter it first'; return; }
          if (!model) { this.fetchLevelsResult[service] = 'Enter a model id first'; return; }
          this.fetchingLevels[service] = true;
          this.fetchLevelsResult[service] = '';
          fetch('/setup/thinking-levels', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({service: service, api_key: apiKey, model: model})
          })
            .then(r => r.json())
            .then(d => {
              if (d.ok && Array.isArray(d.levels) && d.levels.length) {
                this.fetchedLevels[service] = d.levels;
                this.fetchLevelsResult[service] = 'Supported: ' + d.levels.join(', ');
              } else if (d.ok) {
                this.fetchLevelsResult[service] = d.supported ? 'Thinking supported (no effort levels reported)' : 'Model does not support thinking';
              } else {
                this.fetchLevelsResult[service] = 'Failed: ' + (d.error || 'unknown');
              }
            })
            .catch(e => { this.fetchLevelsResult[service] = 'Error: ' + e.message; })
            .finally(() => { this.fetchingLevels[service] = false; });
        },
        // Docs for the reasoning-effort value to type, per provider.
        providerDocsUrl(prov) {
          return ({
            anthropic: 'https://platform.claude.com/docs/en/build-with-claude/effort',
            openai: 'https://platform.openai.com/docs/guides/reasoning',
            google: 'https://ai.google.dev/gemini-api/docs/thinking',
            grok: 'https://docs.x.ai/docs/guides/reasoning',
            deepseek: 'https://api-docs.deepseek.com/guides/reasoning_model'
          })[prov] || '';
        },
        // True when a background kind points at the exact same provider+model as
        // main inference — surfaced in the UI so shared config is obvious.
        sameAsMain(prov, model) {
          return !!model && prov === this.provider && model === this.model;
        },
        fetchModels(service) {
          const apiKey = this.keyFor(service);
          if (!apiKey) {
            this.fetchModelsResult[service] = 'Missing API key — save/enter it first';
            return;
          }
          this.fetchingModels[service] = true;
          this.fetchModelsResult[service] = '';
          fetch('/setup/list-models', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({
              service: service,
              api_key: apiKey,
              base_url: this.resolvedBaseUrl(service) || undefined
            })
          })
            .then(r => r.json())
            .then(d => {
              if (d.ok && Array.isArray(d.models)) {
                this.fetchedModels[service] = d.models;
                this.fetchModelsResult[service] = 'Loaded ' + d.models.length + ' models';
              } else {
                this.fetchModelsResult[service] = 'Failed: ' + (d.error || 'unknown');
              }
            })
            .catch(e => { this.fetchModelsResult[service] = 'Error: ' + e.message; })
            .finally(() => { this.fetchingModels[service] = false; });
        },
        copyModels(service) {
          const fetched = this.fetchedModels[service];
          const list = (fetched && fetched.length)
            ? fetched
            : (this.models[service] || []).map(m => m.value);
          if (!list.length) {
            if (window.showToast) { window.showToast('No models to copy', false); }
            return;
          }
          this.copyText(list.join('\n'));
        },
        init() {
          // Reflect the current sub-tab in the URL so the link is copy-pasteable,
          // even before any sub-tab click (mirrors the top-level ?tab= param).
          try {
            const url = new URL(window.location.href);
            if (url.searchParams.get('llmsub') !== this.section) {
              url.searchParams.set('llmsub', this.section);
              history.replaceState(history.state, '', url);
            }
          } catch (e) {}
          const savedProvider = this.provider;
          // Preserve the server-provided values after Alpine's x-for has
          // rendered the <option> elements — without this the browser
          // resets <select> to the first option before options exist.
          const savedModel = this.model;
          const savedExtraction = this.extractionModel;
          const savedConsolidation = this.consolidationModel;
          const savedGdModel = this.gdModel;
          const savedTrModel = this.trModel;
          this.$nextTick(() => {
            const validProvider = this.providerOptions.some(item => item.value === savedProvider);
            this.provider = validProvider ? savedProvider : 'anthropic';
            this.model = savedModel;
            this.extractionModel = savedExtraction;
            this.consolidationModel = savedConsolidation;
            this.gdModel = savedGdModel;
            this.trModel = savedTrModel;
            this.resetModel();
            this.resetMemoryModel('extraction');
            this.resetMemoryModel('consolidation');
            this.resetBackgroundModel('gd');
            this.resetBackgroundModel('tr');
          });
        },
        resetModel() {
          // Free-text field: only seed a default when empty; never clobber a typed/saved value.
          if (this.model) return;
          const list = this.modelOptions(this.provider);
          if (list.length) { this.model = list[0].value; }
        },
        resetMemoryModel(kind) {
          if (kind === 'extraction') {
            if (this.extractionModel) return;
            const list = this.modelOptions(this.extractionProvider);
            if (list.length) { this.extractionModel = list[0].value; }
            return;
          }
          if (this.consolidationModel) return;
          const list = this.modelOptions(this.consolidationProvider);
          if (list.length) { this.consolidationModel = list[0].value; }
        },
        resetBackgroundModel(kind) {
          if (kind === 'gd') {
            if (this.gdModel) return;
            const list = this.modelOptions(this.gdProvider);
            if (list.length) { this.gdModel = list[0].value; }
            return;
          }
          if (kind === 'rd') {
            if (this.rdModel) return;
            const list = this.modelOptions(this.rdProvider);
            if (list.length) { this.rdModel = list[0].value; }
            return;
          }
          if (this.trModel) return;
          const list = this.modelOptions(this.trProvider);
          if (list.length) { this.trModel = list[0].value; }
        },
        keyFor(service) {
          if (service === 'openai') return this.openaiKey;
          if (service === 'google') return this.googleKey;
          if (service === 'grok') return this.grokKey;
          if (service === 'deepseek') return this.deepseekKey;
          return this.apiKey;
        },
        baseUrlFor(service) {
          if (service === 'openai') return this.openaiBaseUrl;
          if (service === 'google') return this.googleBaseUrl;
          if (service === 'grok') return this.grokBaseUrl;
          if (service === 'deepseek') return this.deepseekBaseUrl;
          return '';
        },
        resolvedBaseUrl(service) {
          const base = this.baseUrlFor(service);
          if (service === 'google') return base || 'https://generativelanguage.googleapis.com/v1beta/openai';
          if (service === 'grok') return base || 'https://api.x.ai/v1';
          if (service === 'deepseek') return base || 'https://api.deepseek.com';
          return base;
        },
        canSelect(service) {
          return this.tests[service] === true;
        },
        testProvider(service) {
          const apiKey = this.keyFor(service);
          if (!apiKey) {
            this.tests[service] = false;
            this.testResults[service] = 'Missing API key';
            return;
          }
          this.testing[service] = true;
          this.testResults[service] = '';
          fetch('/setup/test-connection', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({
              service: service,
              api_key: apiKey,
              base_url: this.resolvedBaseUrl(service) || undefined
            })
          })
            .then(r => r.json())
            .then(d => {
              this.tests[service] = !!d.ok;
              this.testResults[service] = d.ok
                ? 'Connection OK'
                : ('Failed: ' + (d.error || 'unknown'));
            })
            .catch(e => {
              this.tests[service] = false;
              this.testResults[service] = 'Error: ' + e.message;
            })
            .finally(() => {
              this.testing[service] = false;
            });
        },
        copyText(text) {
          if (!text) return;
          navigator.clipboard.writeText(text)
            .then(() => { if (window.showToast) { window.showToast('Copied'); } })
            .catch(() => { if (window.showToast) { window.showToast('Copy failed', false); } });
        },
        previewSystemPrompt() {
          this.promptPreviewLoading = true;
          this.promptPreviewResult = '';
          fetch('/debug/system-prompt/preview', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({
              message: this.promptPreviewMessage,
              include_memories: this.includePreviewMemories,
              include_reflections: this.includePreviewReflections
            })
          })
            .then(r => { this.promptPreviewOk = r.ok; return r.json(); })
            .then(d => {
              this.promptPreviewRaw = d.full_prompt || '';
              this.promptPreviewSections = d.sections || null;
              this.promptPreviewMeta = {
                generated_at: d.generated_at,
                history_mode: d.history_mode,
                token_estimate: d.token_estimate,
                flags: d.flags || {}
              };
              this.promptPreviewResult = this.promptPreviewOk ? 'Prompt preview generated' : (d.detail || 'Failed to preview prompt');
            })
            .catch(e => {
              this.promptPreviewOk = false;
              this.promptPreviewResult = e.message || 'Failed to preview prompt';
            })
            .finally(() => {
              this.promptPreviewLoading = false;
            });
        },
        fetchRecentPrompts() {
          this.recentPromptsLoading = true;
          fetch('/debug/system-prompt/recent', {
            headers: {
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            }
          })
            .then(r => r.json())
            .then(d => {
              this.recentPrompts = Array.isArray(d.items) ? d.items : [];
            })
            .catch(() => {
              this.recentPrompts = [];
            })
            .finally(() => {
              this.recentPromptsLoading = false;
            });
        },
        resetPromptOverrides() {
          this.promptToolUsageOverride = '';
          this.promptHistoryOverride = '';
          this.promptSaveResult = 'Overrides reset locally';
          this.promptSaveOk = true;
        },
        savePromptConfig() {
          fetch('/config', {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({values: {
              'prompt.tool_usage_override': this.promptToolUsageOverride,
              'prompt.history_handling_override': this.promptHistoryOverride,
              'admin.capture_prompts': this.promptCaptureEnabled ? 'true' : 'false'
            }})
          })
            .then(r => { this.promptSaveOk = r.ok; return r.json(); })
            .then(d => {
              this.promptSaveResult = this.promptSaveOk ? 'Prompt settings saved' : (d.detail || 'Error');
              if (this.promptSaveOk && window.showToast) { window.showToast('Prompt settings saved'); }
            })
            .catch(e => {
              this.promptSaveOk = false;
              this.promptSaveResult = e.message || 'Error';
            });
        }
      };
    }
    window.llmTab = llmTab;

    function searchTab(enabled, provider, apiKey, maxResults) {
      return {
        enabled: enabled ?? 'false',
        provider: provider || 'tavily',
        apiKey: apiKey || '',
        maxResults: maxResults || '5',
        result: '',
        resultOk: false,
        testing: false,
        testResult: ''
      };
    }
    window.searchTab = searchTab;

    function calendarTab(providers, googleConnected, googleClientId, hasOAuthCreds) {
      const list = Array.isArray(providers) ? providers : [];
      return {
        providers: list.map((p, idx) => ({
          id: p.id || String(Date.now() + idx),
          name: p.name || '',
          url: p.url || '',
          username: p.username || '',
          password: p.password || '',
          testing: false, testOk: false, testResult: ''
        })),
        status: '',
        result: '',
        ok: false,
        // Google OAuth state
        googleConnected: !!googleConnected,
        oauthClientId: googleClientId || '',
        oauthClientSecret: '',
        hasOAuthCreds: !!hasOAuthCreds,
        oauthStatus: '',
        oauthResult: '',
        oauthOk: false,

        addProvider() {
          this.providers.push({
            id: String(Date.now() + Math.random()),
            name: '',
            url: '',
            username: '',
            password: '',
            testing: false, testOk: false, testResult: ''
          });
        },
        removeProvider(index) {
          this.providers.splice(index, 1);
        },

        testProvider(provider) {
          provider.testing = true; provider.testResult = ''; provider.testOk = false;
          fetch('/calendar/test', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            credentials: 'same-origin',
            body: JSON.stringify({url: provider.url, username: provider.username, password: provider.password})
          })
            .then(async r => { const t = await r.text(); let d = {}; try { d = t ? JSON.parse(t) : {}; } catch (e) { d = {error: t}; } return {ok: r.ok, d}; })
            .then(({ok, d}) => {
              provider.testing = false;
              provider.testOk = ok && !!d.ok;
              provider.testResult = provider.testOk
                ? ('Connected — ' + (d.calendars ?? 0) + ' calendar(s)')
                : (d.error || d.detail || 'Test failed');
            })
            .catch(e => { provider.testing = false; provider.testResult = e.message || 'Network error'; });
        },

        saveOAuthCreds() {
          this.oauthStatus = 'Saving...';
          this.oauthResult = '';
          fetch('/calendar/google/oauth/save-credentials', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({
              client_id: this.oauthClientId.trim(),
              client_secret: this.oauthClientSecret.trim()
            })
          })
            .then(r => r.json())
            .then(data => {
              if (data.ok) {
                this.hasOAuthCreds = true;
                this.oauthOk = true;
                this.oauthResult = 'OAuth credentials saved';
                this.oauthStatus = '';
                if (window.showToast) { window.showToast('OAuth credentials saved'); }
              } else {
                this.oauthOk = false;
                this.oauthResult = data.detail || data.error || 'Save failed';
                this.oauthStatus = '';
              }
            })
            .catch(e => {
              this.oauthOk = false;
              this.oauthResult = e.message || 'Network error';
              this.oauthStatus = '';
            });
        },

        connectGoogle() {
          this.oauthStatus = 'Starting OAuth flow...';
          this.oauthResult = '';
          const self = this;

          // Listen for postMessage from the OAuth popup
          function onMessage(event) {
            if (event.data && event.data.type === 'google-oauth-success') {
              self.googleConnected = true;
              self.oauthOk = true;
              self.oauthResult = 'Google Calendar connected!';
              self.oauthStatus = '';
              if (window.showToast) { window.showToast('Google Calendar connected!'); }
              window.removeEventListener('message', onMessage);
            } else if (event.data && event.data.type === 'google-oauth-error') {
              self.oauthOk = false;
              self.oauthResult = 'Authorization failed: ' + (event.data.error || 'unknown');
              self.oauthStatus = '';
              window.removeEventListener('message', onMessage);
            }
          }
          window.addEventListener('message', onMessage);

          fetch('/calendar/google/oauth/start', {
            headers: {
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            }
          })
            .then(r => r.json())
            .then(data => {
              if (data.auth_url) {
                this.oauthStatus = 'Waiting for Google authorization...';
                window.open(data.auth_url, 'google-oauth', 'width=600,height=700');
              } else {
                this.oauthOk = false;
                this.oauthResult = data.detail || 'Failed to start OAuth flow';
                this.oauthStatus = '';
                window.removeEventListener('message', onMessage);
              }
            })
            .catch(e => {
              this.oauthOk = false;
              this.oauthResult = e.message || 'Network error';
              this.oauthStatus = '';
              window.removeEventListener('message', onMessage);
            });
        },

        saveProviders() {
          this.status = 'Saving...';
          const cleaned = this.providers
            .map(p => ({
              name: (p.name || '').trim(),
              url: (p.url || '').trim(),
              username: (p.username || '').trim(),
              password: (p.password || '').trim()
            }))
            .filter(p => p.name || p.url || p.username || p.password);
          const url = new URL('/calendar/providers', window.location.origin);
          fetch(url.toString(), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            credentials: 'same-origin',
            body: JSON.stringify({providers: cleaned})
          })
            .then(async r => {
              const text = await r.text();
              let data = {};
              try {
                data = text ? JSON.parse(text) : {};
              } catch (err) {
                data = {error: text || 'Invalid response'};
              }
              return {ok: r.ok, data};
            })
            .then(({ok, data}) => {
              this.ok = ok && data.ok;
              this.result = this.ok ? 'Calendars saved' : (data.error || 'Save failed');
              this.status = '';
              if (this.ok && window.showToast) { window.showToast('Calendars saved'); }
            })
            .catch(e => {
              this.ok = false;
              this.result = e.message || 'Network error';
              this.status = '';
            });
        }
      };
    }
    window.calendarTab = calendarTab;

    // Default-identity account bindings (#110) — same shape as the persona
    // editor's, saved to agent.email_accounts/calendar_accounts/contacts_accounts.
    function defaultAccounts(availEmail, availCal, availContacts, emailB, calB, contactsB) {
      return {
        availableEmail: Array.isArray(availEmail) ? [...availEmail] : [],
        availableCalendar: Array.isArray(availCal) ? [...availCal] : [],
        availableContacts: Array.isArray(availContacts) ? [...availContacts] : [],
        emailAccess: {}, calAccess: {}, contactsAccess: {}, senderIdentity: '',
        result: '', ok: false,
        init() {
          for (const a of this.availableEmail) this.emailAccess[a] = 'none';
          for (const a of this.availableCalendar) this.calAccess[a] = 'none';
          for (const a of this.availableContacts) this.contactsAccess[a] = 'none';
          for (const e of (emailB || [])) {
            if (!(e.account in this.emailAccess)) this.availableEmail.push(e.account);
            this.emailAccess[e.account] = e.access_level || 'read';
            if (e.is_sender_identity) this.senderIdentity = e.account;
          }
          for (const c of (calB || [])) {
            if (!(c.account in this.calAccess)) this.availableCalendar.push(c.account);
            this.calAccess[c.account] = c.access_level || 'read';
          }
          for (const c of (contactsB || [])) {
            if (!(c.account in this.contactsAccess)) this.availableContacts.push(c.account);
            this.contactsAccess[c.account] = c.access_level || 'read';
          }
        },
        _buildEmail() {
          const out = [];
          for (const a of this.availableEmail) {
            const lvl = this.emailAccess[a];
            if (!lvl || lvl === 'none') continue;
            const isSender = this.senderIdentity === a;
            out.push({account: a, access_level: isSender ? 'read_write' : lvl, is_sender_identity: isSender});
          }
          return out;
        },
        _buildLevels(available, access) {
          const out = [];
          for (const a of available) {
            const lvl = access[a];
            if (!lvl || lvl === 'none') continue;
            out.push({account: a, access_level: lvl});
          }
          return out;
        },
        save() {
          const vals = {
            'agent.email_accounts': JSON.stringify(this._buildEmail()),
            'agent.calendar_accounts': JSON.stringify(this._buildLevels(this.availableCalendar, this.calAccess)),
            'agent.contacts_accounts': JSON.stringify(this._buildLevels(this.availableContacts, this.contactsAccess)),
          };
          fetch('/config', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')},
            body: JSON.stringify({values: vals})
          })
            .then(r => { this.ok = r.ok; return r.json().catch(() => ({})); })
            .then(d => {
              this.result = this.ok ? 'Default accounts saved' : (d.detail || 'Error');
              if (this.ok && window.showToast) window.showToast('Default accounts saved');
            })
            .catch(e => { this.ok = false; this.result = e.message; });
        },
      };
    }
    window.defaultAccounts = defaultAccounts;

    function contactsTab(providers) {
      const list = Array.isArray(providers) ? providers : [];
      return {
        providers: list.map((p, idx) => ({
          id: p.id || String(Date.now() + idx),
          name: p.name || '',
          type: p.type || 'carddav',
          url: p.url || '',
          username: p.username || '',
          password: p.password || '',
          client_id: p.client_id || '',
          client_secret: p.client_secret || '',
          oauth_status: '',
          testing: false, testOk: false, testResult: ''
        })),
        status: '',
        result: '',
        ok: false,
        addProvider() {
          this.providers.push({
            id: String(Date.now() + Math.random()),
            name: '',
            type: 'carddav',
            url: '',
            username: '',
            password: '',
            client_id: '',
            client_secret: '',
            testing: false, testOk: false, testResult: ''
          });
        },
        removeProvider(index) {
          this.providers.splice(index, 1);
        },
        testProvider(provider) {
          provider.testing = true; provider.testResult = ''; provider.testOk = false;
          fetch('/contacts/test', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            credentials: 'same-origin',
            body: JSON.stringify({url: provider.url, username: provider.username, password: provider.password})
          })
            .then(async r => { const t = await r.text(); let d = {}; try { d = t ? JSON.parse(t) : {}; } catch (e) { d = {error: t}; } return {ok: r.ok, d}; })
            .then(({ok, d}) => {
              provider.testing = false;
              provider.testOk = ok && !!d.ok;
              provider.testResult = provider.testOk
                ? ('Connected — ' + (d.contacts ?? 0) + ' contact(s)')
                : (d.error || d.detail || 'Test failed');
            })
            .catch(e => { provider.testing = false; provider.testResult = e.message || 'Network error'; });
        },
        saveProviders() {
          this.status = 'Saving...';
          const cleaned = this.providers
            .map(p => ({
              name: (p.name || '').trim(),
              type: (p.type || 'carddav').trim(),
              url: (p.url || '').trim(),
              username: (p.username || '').trim(),
              password: (p.password || '').trim(),
              client_id: (p.client_id || '').trim(),
              client_secret: (p.client_secret || '').trim()
            }))
            .filter(p => p.name || p.url || p.username || p.password || p.client_id || p.client_secret);
          fetch('/contacts/providers', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({providers: cleaned})
          })
            .then(async r => {
              const text = await r.text();
              let data = {};
              try {
                data = text ? JSON.parse(text) : {};
              } catch (err) {
                data = {error: text || 'Invalid response'};
              }
              return {ok: r.ok, data};
            })
            .then(({ok, data}) => {
              this.ok = ok && data.ok;
              this.result = this.ok ? 'Contacts saved' : (data.error || 'Save failed');
              this.status = '';
              if (this.ok && window.showToast) { window.showToast('Contacts saved'); }
            })
            .catch(e => {
              this.ok = false;
              this.result = e.message || 'Network error';
              this.status = '';
            });
        }
        ,
        startGoogleOAuth(provider) {
          if (!provider || !provider.client_id || !provider.client_secret) {
            this.ok = false;
            this.result = 'Google client ID and secret are required.';
            return;
          }
          provider.oauth_status = 'Starting OAuth...';
          fetch('/calendar/google/oauth/save-credentials', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            body: JSON.stringify({client_id: provider.client_id, client_secret: provider.client_secret})
          })
            .then(r => r.json())
            .then(d => {
              if (!d || d.ok !== true) {
                throw new Error(d.error || 'Failed to save OAuth credentials');
              }
              return fetch('/contacts/google/oauth/start', {
                headers: {
                  'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
                }
              });
            })
            .then(r => r.json())
            .then(d => {
              if (!d || !d.auth_url) {
                throw new Error(d.error || 'Missing auth URL');
              }
              const w = window.open(d.auth_url, 'google-oauth', 'width=600,height=720');
              if (!w) {
                throw new Error('Popup blocked. Allow popups to continue.');
              }
              provider.oauth_status = 'Waiting for Google authorization...';
              const handler = (evt) => {
                if (!evt || !evt.data || typeof evt.data.type !== 'string') return;
                if (evt.data.type === 'google-oauth-success') {
                  provider.oauth_status = 'Connected.';
                  window.removeEventListener('message', handler);
                }
                if (evt.data.type === 'google-oauth-error') {
                  provider.oauth_status = evt.data.error || 'Authorization failed.';
                  window.removeEventListener('message', handler);
                }
              };
              window.addEventListener('message', handler);
            })
            .catch(e => {
              provider.oauth_status = e.message || 'OAuth failed.';
            });
        }
      };
    }
    window.contactsTab = contactsTab;

    function emailTab(providers) {
      const list = Array.isArray(providers) ? providers : [];
      return {
        providers: list.map((p, idx) => ({
          id: p.id || String(Date.now() + idx),
          name: p.name || '',
          email: p.email || '',
          display_name: p.display_name || '',
          imap_host: p.imap_host || '',
          imap_port: p.imap_port || '993',
          smtp_host: p.smtp_host || '',
          smtp_port: p.smtp_port || '465',
          login: p.login || '',
          password: p.password || '',
          testing: false, testOk: false, testResult: ''
        })),
        status: '',
        result: '',
        resultOk: false,

        // Common-provider presets so a phone setup is a name + password, nothing
        // else to look up (#110).
        presets: {
          purelymail: {imap_host: 'imap.purelymail.com', imap_port: '993', smtp_host: 'smtp.purelymail.com', smtp_port: '465'},
          gmail: {imap_host: 'imap.gmail.com', imap_port: '993', smtp_host: 'smtp.gmail.com', smtp_port: '465'},
          fastmail: {imap_host: 'imap.fastmail.com', imap_port: '993', smtp_host: 'smtp.fastmail.com', smtp_port: '465'}
        },
        applyPreset(provider, key) {
          const p = this.presets[key];
          if (p) Object.assign(provider, p);
        },

        testProvider(provider) {
          provider.testing = true; provider.testResult = ''; provider.testOk = false;
          fetch('/email/test', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              imap_host: provider.imap_host, imap_port: (provider.imap_port || '993').toString(),
              smtp_host: provider.smtp_host, smtp_port: (provider.smtp_port || '465').toString(),
              login: provider.login, email: provider.email, password: provider.password
            })
          })
            .then(async r => { const t = await r.text(); let d = {}; try { d = t ? JSON.parse(t) : {}; } catch (e) { d = {error: t}; } return {ok: r.ok, d}; })
            .then(({ok, d}) => {
              provider.testing = false;
              if (!ok) { provider.testResult = d.error || d.detail || 'Test failed'; return; }
              provider.testOk = !!d.ok;
              const parts = [];
              if (d.imap != null) parts.push('IMAP ' + d.imap);
              if (d.smtp != null) parts.push('SMTP ' + d.smtp);
              provider.testResult = parts.length ? parts.join(' · ') : 'Nothing to test';
            })
            .catch(e => { provider.testing = false; provider.testResult = e.message || 'Network error'; });
        },

        addProvider() {
          this.providers.push({
            id: String(Date.now() + Math.random()),
            name: '',
            email: '',
            display_name: '',
            imap_host: '',
            imap_port: '993',
            smtp_host: '',
            smtp_port: '465',
            login: '',
            password: '',
            testing: false, testOk: false, testResult: ''
          });
        },
        removeProvider(index) {
          this.providers.splice(index, 1);
        },

        saveProviders() {
          this.status = 'Saving...';
          this.result = '';
          const cleaned = this.providers
            .map(p => ({
              name: (p.name || '').trim(),
              email: (p.email || '').trim(),
              display_name: (p.display_name || '').trim(),
              imap_host: (p.imap_host || '').trim(),
              imap_port: (p.imap_port || '993').toString().trim(),
              smtp_host: (p.smtp_host || '').trim(),
              smtp_port: (p.smtp_port || '465').toString().trim(),
              login: (p.login || '').trim(),
              password: (p.password || '').trim()
            }))
            .filter(p => p.name || p.email || p.imap_host || p.smtp_host);
          fetch('/email/providers', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
            },
            credentials: 'same-origin',
            body: JSON.stringify({providers: cleaned})
          })
            .then(async r => {
              const text = await r.text();
              let data = {};
              try { data = text ? JSON.parse(text) : {}; } catch (err) { data = {error: text || 'Invalid response'}; }
              return {ok: r.ok, data};
            })
            .then(({ok, data}) => {
              this.resultOk = ok && data.ok;
              this.result = this.resultOk ? 'Email accounts saved' : (data.error || data.detail || 'Save failed');
              this.status = '';
              if (this.resultOk && window.showToast) { window.showToast('Email accounts saved'); }
            })
            .catch(e => {
              this.resultOk = false;
              this.result = e.message || 'Network error';
              this.status = '';
            });
        }
      };
    }
    window.emailTab = emailTab;

    // Inspect tab wrapper: Context | Logs sub-tabs, each lazy-loaded via htmx.
    // Mirrors the active sub-tab in the URL (?inspectsub=) like the top-level
    // ?tab= param, so links are copy-pasteable.
    function inspectTabs() {
      const subs = { context: '/partials/inspect', logs: '/partials/logs' };
      const allowed = Object.keys(subs);
      return {
        sub: null,
        init() {
          let initial = 'context';
          try {
            const q = new URLSearchParams(window.location.search).get('inspectsub');
            if (allowed.includes(q)) { initial = q; }
            else {
              const ls = localStorage.getItem('inspect_sub');
              if (allowed.includes(ls)) { initial = ls; }
            }
          } catch (e) {}
          this.sub = initial;
          this._syncUrl(initial);
          this.$nextTick(() => this._load(initial));
        },
        select(name) {
          if (this.sub === name) { return; }
          this.sub = name;
          try { localStorage.setItem('inspect_sub', name); } catch (e) {}
          this._syncUrl(name);
          this._load(name);
        },
        _syncUrl(name) {
          try {
            const url = new URL(window.location.href);
            url.searchParams.set('inspectsub', name);
            history.replaceState(history.state, '', url);
          } catch (e) {}
        },
        _load(name) {
          if (window.htmx) { htmx.ajax('GET', subs[name], {target: '#inspect-sub', swap: 'innerHTML'}); }
        }
      };
    }
    window.inspectTabs = inspectTabs;

    // Global: handle 401 by redirecting to auth gate
    document.body.addEventListener('htmx:responseError', function(e) {
      if (e.detail.xhr.status === 401) {
        window.location.href = '/login';
      } else if (window.showToast) {
        // Show error message for non-2xx responses
        let msg = 'Request failed';
        try { msg = JSON.parse(e.detail.xhr.responseText).detail || msg; } catch(_) {}
        window.showToast(msg, false);
      }
    });

    // Global: listen for HX-Trigger showToast events from the server
    document.body.addEventListener('showToast', function(e) {
      if (window.showToast && e.detail && e.detail.value) {
        window.showToast(e.detail.value);
      } else if (window.showToast && typeof e.detail === 'string') {
        window.showToast(e.detail);
      }
    });
  </script>
