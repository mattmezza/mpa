<div class="card" x-data="{ selected: {{ (step_ctx.active or '')|tojson }} }">
  <h2 class="text-base mb-1">Pick a starting persona <span class="text-muted font-normal text-xs">(optional)</span></h2>
  <p class="text-muted text-xs mb-3">
    A persona gives your assistant a specialty — its own character, skills, and voice.
    Keep the default for a general assistant; you can add or switch personas anytime.
  </p>

  <div class="space-y-1.5 max-h-72 overflow-y-auto">
    <label class="flex items-center gap-2 text-sm cursor-pointer p-2 rounded hover:bg-surface"
           :class="selected === '' && 'bg-accent-dim/20'">
      <input type="radio" name="persona" value="" x-model="selected">
      <span class="text-lg">🧭</span>
      <span><span class="font-semibold">Default</span> — general assistant</span>
    </label>
    {% for p in step_ctx.personas %}
    <label class="flex items-center gap-2 text-sm cursor-pointer p-2 rounded hover:bg-surface"
           :class="selected === {{ p.name|tojson }} && 'bg-accent-dim/20'">
      <input type="radio" name="persona" value="{{ p.name }}" x-model="selected">
      <span class="text-lg">{{ p.emoji or '🧩' }}</span>
      <span><span class="font-semibold">{{ p.role or p.name }}</span>
        <span class="text-muted text-xs">{{ p.name }}</span></span>
    </label>
    {% endfor %}
  </div>

  <div class="flex justify-between mt-4">
    <button class="btn"
            hx-post="/setup/step" hx-target="#wizard-step" hx-swap="innerHTML"
            hx-vals='{"step": "identity", "values": {}}'>
      Back
    </button>
    <div class="flex gap-2">
      <button class="btn"
              hx-post="/setup/step" hx-target="#wizard-step" hx-swap="innerHTML"
              hx-vals='{"step": "telegram", "values": {}}'>
        Skip
      </button>
      <button class="btn-primary"
              @click="
                htmx.ajax('POST', '/setup/step', {
                  target: '#wizard-step', swap: 'innerHTML',
                  values: { step: 'telegram', 'values[agent.active_persona]': selected }
                })
              ">
        Continue
      </button>
    </div>
  </div>
</div>
